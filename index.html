<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pass'Shift · eDOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F45000; --orange-light: #FF6A20; --orange-dim: rgba(244,80,0,0.12);
      --bg: #111111; --surface: #1C1C1C; --surface2: #242424;
      --border: rgba(255,255,255,0.08);
      --text: #F0F0EE; --text-muted: #888882; --text-dim: #555550;
      --success: #2ECC71; --success-dim: rgba(46,204,113,0.12);
      --danger: #E74C3C; --danger-dim: rgba(231,76,60,0.12);
      --warn: #F39C12; --warn-dim: rgba(243,156,18,0.12);
      --radius: 10px; --radius-lg: 14px;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 14px; height: 60px; position: sticky; top: 0; z-index: 10; }
    .logo-wrap { width: 36px; height: 36px; background: var(--orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 15px; color: white; }
    .header-titles { flex: 1; }
    .app-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: 0.5px; color: var(--text); line-height: 1; }
    .app-sub { font-size: 12px; color: var(--text-muted); }
    .header-badge { background: var(--orange-dim); color: var(--orange); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(244,80,0,0.3); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; }
    .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .tab { flex: 1; padding: 11px; font-size: 12px; font-weight: 600; border: none; background: transparent; cursor: pointer; color: var(--text-muted); transition: all 0.2s; font-family: 'Barlow', sans-serif; }
    .tab.active { background: var(--orange); color: white; }
    .tab:not(.active):hover { color: var(--text); background: var(--surface2); }
    .view { display: none; } .view.active { display: block; }
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s; }
    .section:focus-within { border-color: rgba(244,80,0,0.3); }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
    .section-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--orange-dim); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; text-transform: uppercase; }
    .section-sub { font-size: 11px; color: var(--text-muted); font-family: 'Barlow', sans-serif; margin-top: 1px; }
    .field { margin-bottom: 10px; } .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .field input[type=text], .field input[type=number], .field select, .field textarea {
      width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface2); color: var(--text);
      font-family: 'Barlow', sans-serif; transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--orange); }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-dim); }
    .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 500px) { .row2 { grid-template-columns: 1fr; } }
    .urgence-btns { display: flex; gap: 6px; }
    .urgence-btn { flex: 1; padding: 9px 4px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); cursor: pointer; color: var(--text-muted); text-align: center; transition: all 0.15s; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
    .urgence-btn.sel-haute { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
    .urgence-btn.sel-moyenne { background: var(--warn-dim); border-color: var(--warn); color: var(--warn); }
    .urgence-btn.sel-basse { background: var(--success-dim); border-color: var(--success); color: var(--success); }
    .scooter-item, .rnu-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; padding-top: 36px; margin-bottom: 10px; position: relative; }
    .scooter-item { border-left: 3px solid var(--orange); }
    .rnu-item { border-left: 3px solid #3B82F6; }
    .remove-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-dim); line-height: 1; transition: color 0.15s; }
    .remove-btn:hover { color: var(--danger); }
    .item-label { position: absolute; top: 10px; left: 12px; font-size: 11px; font-weight: 700; color: var(--orange); font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
    .scooter-item .field input, .rnu-item .field input { background: var(--surface); }
    .add-btn { width: 100%; padding: 11px; border: 1px dashed rgba(244,80,0,0.3); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--orange); display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; font-family: 'Barlow', sans-serif; }
    .add-btn:hover { background: var(--orange-dim); border-color: var(--orange); }
    .status-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .status-btn { padding: 8px 22px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); border-radius: 20px; background: var(--surface2); cursor: pointer; color: var(--text-muted); transition: all 0.15s; font-family: 'Barlow', sans-serif; }
    .status-btn.sel-oui { background: var(--success-dim); border-color: var(--success); color: var(--success); }
    .status-btn.sel-non { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
    .check-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .check-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--orange); }
    .check-row label { font-size: 14px; color: var(--text); cursor: pointer; }
    .hidden { display: none !important; }
    .submit-btn { width: 100%; padding: 15px; background: var(--orange); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: 'Barlow Condensed', sans-serif; margin-top: 0.5rem; letter-spacing: 1px; text-transform: uppercase; }
    .submit-btn:hover { background: var(--orange-light); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; display: none; z-index: 100; font-family: 'Barlow', sans-serif; max-width: 320px; }
    .toast.success { background: var(--success-dim); color: var(--success); border: 1px solid var(--success); }
    .toast.error { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); }
    .astreinte-auto { background: var(--orange-dim); border: 1px solid rgba(244,80,0,0.3); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
    .astreinte-auto-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    .astreinte-auto-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--orange); }
    .astreinte-auto-phone { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .passation-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 10px; transition: border-color 0.2s; }
    .passation-card:hover { border-color: rgba(244,80,0,0.25); }
    .passation-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
    .passation-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .passation-meta { font-size: 12px; color: var(--text-muted); }
    .creneau-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: var(--orange-dim); color: var(--orange); white-space: nowrap; flex-shrink: 0; border: 1px solid rgba(244,80,0,0.25); font-family: 'Barlow Condensed', sans-serif; }
    .pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .pill { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .pill-ok { background: var(--success-dim); color: var(--success); border: 1px solid rgba(46,204,113,0.25); }
    .pill-nok { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(231,76,60,0.25); }
    .astreinte-line { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .astreinte-line strong { color: var(--text); }
    .msg-block { font-size: 13px; color: var(--text); padding: 10px 12px; background: var(--surface2); border-radius: var(--radius); line-height: 1.5; margin-bottom: 10px; border-left: 3px solid var(--orange); }
    .sub-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .sub-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .offline-row { font-size: 13px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 6px; line-height: 1.7; border-left: 3px solid var(--orange); }
    .urgence-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-left: 6px; vertical-align: middle; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
    .tag-haute { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(231,76,60,0.3); }
    .tag-moyenne { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(243,156,18,0.3); }
    .tag-basse { background: var(--success-dim); color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
    .rnu-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .rnu-tag { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(59,130,246,0.1); color: #60A5FA; border: 1px solid rgba(59,130,246,0.25); }
    .wa-btn { width: 100%; margin-top: 12px; padding: 11px; background: #25D366; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; color: white; font-family: 'Barlow Condensed', sans-serif; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
    .wa-btn:hover { background: #1eac53; }

    /* RAPPORT */
    .rapport-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .rapport-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .rapport-week { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .nav-btn { padding: 7px 14px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); cursor: pointer; color: var(--text-muted); font-family: 'Barlow', sans-serif; transition: all 0.15s; }
    .nav-btn:hover { border-color: var(--orange); color: var(--orange); }
    .export-btn { padding: 7px 16px; font-size: 12px; font-weight: 700; border: none; border-radius: var(--radius); background: var(--success); cursor: pointer; color: white; font-family: 'Barlow Condensed', sans-serif; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px; }
    .export-btn:hover { opacity: 0.85; }
    .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
    @media (max-width: 500px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
    .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--orange); line-height: 1; }
    .stat-num.danger { color: var(--danger); }
    .stat-num.success { color: var(--success); }
    .stat-num.warn { color: var(--warn); }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }

    /* INCIDENT TABLE */
    .incident-table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 1rem; }
    .incident-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
    .incident-table th { background: var(--surface2); padding: 10px 12px; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .incident-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text); line-height: 1.5; }
    .incident-table tr:last-child td { border-bottom: none; }
    .incident-table tr:hover td { background: rgba(255,255,255,0.02); }
    .incident-table tr.row-en-cours td { background: rgba(231,76,60,0.04); }
    .incident-table tr.row-resolu td { background: rgba(46,204,113,0.03); }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; white-space: nowrap; }
    .badge-en-cours { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(231,76,60,0.3); }
    .badge-resolu { background: var(--success-dim); color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
    .badge-haute { background: var(--danger-dim); color: var(--danger); }
    .badge-moyenne { background: var(--warn-dim); color: var(--warn); }
    .badge-basse { background: var(--success-dim); color: var(--success); }
    .scooter-nom { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
    .duree-cell { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; }
    .duree-long { color: var(--danger); }
    .duree-moyen { color: var(--warn); }
    .duree-court { color: var(--success); }
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-radius: 20px; background: transparent; cursor: pointer; color: var(--text-muted); font-family: 'Barlow', sans-serif; transition: all 0.15s; }
    .filter-btn.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo-wrap">PS</div>
  <div class="header-titles">
    <div class="app-title">PASS'SHIFT</div>
    <div class="app-sub">Passation intelligente · eDOG</div>
  </div>
  <div class="header-badge">BORDEAUX</div>
</div>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('form', this)">Nouvelle passation</button>
    <button class="tab" onclick="switchTab('history', this)">Historique</button>
    <button class="tab" onclick="switchTab('rapport', this)">Rapport</button>
  </div>

  <!-- FORMULAIRE -->
  <div id="view-form" class="view active">
    <div class="section">
      <div class="section-header"><div class="section-icon">⏱</div><div><div class="section-title">Infos du shift</div></div></div>
      <div class="row2">
        <div class="field"><label>Créneau</label><input type="text" id="creneau" placeholder="Ex : 6h-14h"></div>
        <div class="field"><label>Votre prénom</label><input type="text" id="creePar" placeholder="Ex : Clément"></div>
      </div>
      <div class="field">
        <label>Personne d'astreinte</label>
        <div class="astreinte-auto">
          <div class="astreinte-auto-label">Astreinte automatique</div>
          <div class="astreinte-auto-name" id="astreinte-nom">—</div>
          <div class="astreinte-auto-phone" id="astreinte-tel">—</div>
        </div>
        <input type="hidden" id="astreinte" value="">
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon">🛵</div><div><div class="section-title">Scooters offline</div></div></div>
      <div id="scooters-list"></div>
      <button class="add-btn" onclick="addScooter()">+ Ajouter un scooter offline</button>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon">🔧</div><div><div class="section-title">RNU</div><div class="section-sub">Running Non User</div></div></div>
      <div id="rnu-list"></div>
      <button class="add-btn" onclick="addRNU()">+ Ajouter un scooter en RNU</button>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon">✅</div><div><div class="section-title">VP</div><div class="section-sub">Validation Pending</div></div></div>
      <div class="field">
        <label>A jour dans les VP ?</label>
        <div class="status-row">
          <button class="status-btn" id="vp-oui" onclick="setStatus('vp','oui')">Oui</button>
          <button class="status-btn" id="vp-non" onclick="setStatus('vp','non')">Non</button>
        </div>
        <input type="hidden" id="vp-val" value="">
        <input type="text" id="vp-comment" placeholder="Commentaire (optionnel)">
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon">📋</div><div><div class="section-title">Reports</div></div></div>
      <div class="field">
        <label>A jour dans les reports ?</label>
        <div class="status-row">
          <button class="status-btn" id="rep-oui" onclick="setStatus('rep','oui')">Oui</button>
          <button class="status-btn" id="rep-non" onclick="setStatus('rep','non')">Non</button>
        </div>
        <input type="hidden" id="rep-val" value="">
        <input type="text" id="rep-comment" placeholder="Commentaire (optionnel)">
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon">🗺️</div><div><div class="section-title">Trips longs</div></div></div>
      <div class="check-row">
        <input type="checkbox" id="trips-ok" onchange="toggleTrips()">
        <label for="trips-ok">Tout est OK, aucun trip long a signaler</label>
      </div>
      <div id="trips-detail" class="field">
        <label>Detail des trips longs</label>
        <textarea id="trips-text" placeholder="Ex : Trip de 45 min sur BX-123..."></textarea>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-icon">💬</div><div><div class="section-title">Message equipe</div></div></div>
      <div class="field">
        <textarea id="message" placeholder="Infos importantes, contexte, points d'attention..."></textarea>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitPassation()">Envoyer la passation</button>
  </div>

  <!-- HISTORIQUE -->
  <div id="view-history" class="view">
    <div id="history-list"><div class="loading">Chargement...</div></div>
  </div>

  <!-- RAPPORT -->
  <div id="view-rapport" class="view">
    <div class="rapport-toolbar">
      <div class="rapport-week" id="rapport-week-label">Semaine en cours</div>
      <div class="rapport-controls">
        <button class="nav-btn" onclick="changeWeek(-1)">← Préc.</button>
        <button class="nav-btn" onclick="changeWeek(1)">Suiv. →</button>
        <button class="export-btn" id="export-btn" onclick="exportRapport()">Exporter Sheets</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('tous', this)">Tous</button>
      <button class="filter-btn" onclick="setFilter('en-cours', this)">En cours</button>
      <button class="filter-btn" onclick="setFilter('resolu', this)">Resolus</button>
    </div>
    <div id="rapport-content"><div class="loading">Chargement...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7IFxDivZZuRCPj65kYimgAs9-95tcsHacOLLVIsrJZCOXJv8eUW2tDvvVcohU-BODEQ/exec";
let sCount = 0, rCount = 0, rapportWeekOffset = 0;
let _incidents = [], _activeFilter = 'tous';

// ─── PLANNING ASTREINTE ───
const TEAM = {
  'Jerome':  { tel: '0621948656' },
  'Thierry': { tel: '0651670676' },
  'Romain':  { tel: '0750292571' },
  'Antoine': { tel: '0649951167' },
  'Martin':  { tel: '0651578873' }
};
const PLANNING = [
  {d:'2026-01-05',n:'Jerome'},{d:'2026-01-12',n:'Antoine'},{d:'2026-01-19',n:'Martin'},{d:'2026-01-26',n:'Thierry'},

  {d:'2026-04-06',n:'Thierry'},{d:'2026-04-13',n:'Jerome'},{d:'2026-04-20',n:'Romain'},{d:'2026-04-27',n:'Antoine'},{d:'2026-05-04',n:'Martin'}

function getAstreinte(date) {
  const d = new Date(date);
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  const mondayStr = monday.toISOString().split('T')[0];
  const sorted = [...PLANNING].sort((a,b) => a.d.localeCompare(b.d));
  let found = sorted[0];
  for (const entry of sorted) { if (entry.d <= mondayStr) found = entry; else break; }
  return found ? { nom: found.n, tel: TEAM[found.n]?.tel || '' } : null;
}

function initAstreinte() {
  const a = getAstreinte(new Date());
  if (a) {
    document.getElementById('astreinte-nom').textContent = a.nom;
    document.getElementById('astreinte-tel').textContent = a.tel;
    document.getElementById('astreinte').value = `${a.nom} (${a.tel})`;
  }
}

async function submitPassation() {
  const btn = document.getElementById('submit-btn');
  const creePar = document.getElementById('creePar').value.trim();
  const astreinte = document.getElementById('astreinte').value.trim();
  const creneau = document.getElementById('creneau').value.trim();
  if (!creePar) { showToast('Merci d\'indiquer votre prénom.', 'error'); return; }
  if (!creneau) { showToast('Merci d\'indiquer le créneau du shift.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Envoi en cours...';
  const tripsOk = document.getElementById('trips-ok').checked;
  const payload = {
    action: 'addPassation', date: new Date().toISOString(), creneau,
    ville: 'Bordeaux', astreinte, creePar,
    vp: document.getElementById('vp-val').value,
    vpComment: document.getElementById('vp-comment').value,
    reports: document.getElementById('rep-val').value,
    reportsComment: document.getElementById('rep-comment').value,
    tripsOk: tripsOk ? 'Oui' : 'Non',
    tripsDetail: tripsOk ? '' : document.getElementById('trips-text').value,
    message: document.getElementById('message').value,
    scooters: collectScooters(), rnu: collectRNU()
  };
  try {
    await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(payload), mode:'no-cors' });
    showToast('Passation envoyee !', 'success');
    resetForm();
  } catch(e) { showToast('Erreur lors de l\'envoi.', 'error'); }
  btn.disabled = false; btn.textContent = 'Envoyer la passation';
}

function resetForm() {
  ['creePar','creneau','message','vp-comment','rep-comment','trips-text'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  document.getElementById('scooters-list').innerHTML = '';
  document.getElementById('rnu-list').innerHTML = '';
  document.getElementById('trips-ok').checked = false;
  document.getElementById('trips-detail').classList.remove('hidden');
  ['vp-val','rep-val'].forEach(id => document.getElementById(id).value='');
  ['vp-oui','vp-non','rep-oui','rep-non'].forEach(id => document.getElementById(id).className='status-btn');
  sCount=0; rCount=0;
}

function buildWhatsAppText(p, scooters, rnus) {
  const urgLabel = { haute:'[!!] HAUTE', moyenne:'[!]  MOYENNE', basse:'[ ]  BASSE' };
  const date = new Date(p.Date);
  const dateStr = isNaN(date) ? p.Date : date.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const creneau = p['Créneau'] && !p['Créneau'].includes('T22:00') && !p['Créneau'].includes('T00:00') ? p['Créneau'] : '';
  const sep = `__________________________\n`;
  let t = `PASS'SHIFT eDOG - Bordeaux\n`;
  t += sep;
  t += `${dateStr}${creneau ? ' - ' + creneau : ''}\n`;
  t += `Par : ${p['Créé par']||'—'}  |  Astreinte : ${p.Astreinte||'—'}\n`;
  t += sep;
  if (scooters.length > 0) {
    t += `SCOOTERS OFFLINE (${scooters.length})\n`;
    scooters.forEach(s => {
      t += `\n${urgLabel[s.Urgence]||'[ ]'} - ${s.Nom||'—'}\n`;
      if (s.Loc2hire) t += `  > 2hire : ${s.Loc2hire}\n`;
      if (s.LocUser) t += `  > Utilisateur : ${s.LocUser}\n`;
      const infos = [s.Batterie ? `Batterie ${s.Batterie}%` : '', s.Depuis ? `Offline depuis ${s.Depuis}` : ''].filter(Boolean).join(' - ');
      if (infos) t += `  > ${infos}\n`;
      if (s.Action) t += `  > Action : ${s.Action}\n`;
    });
    t += '\n';
  } else { t += `Aucun scooter offline\n`; }
  if (rnus.length > 0) { t += sep; t += `RNU : ${rnus.map(r => r.Nom||'—').join(' - ')}\n`; }
  t += sep;
  t += `STATUTS\n`;
  t += `VP      : ${p.VP==='oui'?'A jour':'Non a jour'}${p['VP Comment']?' ('+p['VP Comment']+')':''}\n`;
  t += `Reports : ${p.Reports==='oui'?'A jour':'Non a jour'}${p['Reports Comment']?' ('+p['Reports Comment']+')':''}\n`;
  t += `Trips   : ${p.TripsOk==='Oui'?'OK':'A verifier'}${p['Trips Detail']?' - '+p['Trips Detail']:''}\n`;
  if (p.Message) { t += sep; t += `${p.Message}\n`; }
  return t;
}

function sendToWhatsApp(passationId) {
  const p = (window._passations||[]).find(x => x.ID === passationId);
  const scooters = (window._scooters||[]).filter(s => s.ID_Passation === passationId);
  const rnus = (window._rnus||[]).filter(r => r.ID_Passation === passationId);
  if (!p) return;
  window.open('https://wa.me/?text=' + encodeURIComponent(buildWhatsAppText(p, scooters, rnus)), '_blank');
}

// ─── RAPPORT ───
function getWeekBounds(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { monday, sunday };
}

function changeWeek(dir) { rapportWeekOffset += dir; loadRapport(); }

function setFilter(filter, btn) {
  _activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderIncidents();
}

function formatDuree(ms) {
  if (ms < 0) return '—';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h === 0) return `${m}min`;
  if (h < 24) return `${h}h${m > 0 ? m + 'min' : ''}`;
  const d = Math.floor(h / 24);
  const rh = h % 24;
  return `${d}j ${rh}h`;
}

function dureeClass(ms) {
  const h = ms / 3600000;
  if (h > 24) return 'duree-long';
  if (h > 8) return 'duree-moyen';
  return 'duree-court';
}

function buildIncidents(passations, allScooters) {
  // Sort passations by date ASC
  const sorted = [...passations].sort((a,b) => new Date(a.Date) - new Date(b.Date));

  // Build a map: scooterNom -> list of {passation, scooter}
  const appearances = {};
  sorted.forEach(p => {
    const scooters = allScooters.filter(s => s.ID_Passation === p.ID);
    scooters.forEach(s => {
      if (!s.Nom) return;
      if (!appearances[s.Nom]) appearances[s.Nom] = [];
      appearances[s.Nom].push({ passation: p, scooter: s, date: new Date(p.Date) });
    });
  });

  // Build incidents: group consecutive appearances into one incident
  const incidents = [];
  Object.entries(appearances).forEach(([nom, apps]) => {
    // Group into incidents: new incident starts if gap > 24h between appearances
    let incidentApps = [apps[0]];
    for (let i = 1; i < apps.length; i++) {
      const gap = apps[i].date - apps[i-1].date;
      if (gap > 24 * 3600000 * 2) {
        // Close current incident, start new
        incidents.push(buildIncident(nom, incidentApps, sorted, allScooters));
        incidentApps = [apps[i]];
      } else {
        incidentApps.push(apps[i]);
      }
    }
    incidents.push(buildIncident(nom, incidentApps, sorted, allScooters));
  });

  return incidents.sort((a,b) => b.dateDebut - a.dateDebut);
}

function buildIncident(nom, apps, allPassations, allScooters) {
  const dateDebut = apps[0].date;
  const dernierApp = apps[apps.length - 1];
  const dernierDate = dernierApp.date;

  // Find the next passation after last appearance
  const nextPassation = allPassations.find(p => {
    const d = new Date(p.Date);
    return d > dernierDate;
  });

  let statut, dateResolution, dureeMs;
  if (nextPassation) {
    // Check if scooter appears in next passation
    const scootersInNext = allScooters.filter(s => s.ID_Passation === nextPassation.ID).map(s => s.Nom);
    if (!scootersInNext.includes(nom)) {
      statut = 'resolu';
      dateResolution = new Date(nextPassation.Date);
      dureeMs = dateResolution - dateDebut;
    } else {
      statut = 'en-cours';
      dureeMs = new Date() - dateDebut;
    }
  } else {
    statut = 'en-cours';
    dureeMs = new Date() - dateDebut;
  }

  const firstScooter = apps[0].scooter;
  return {
    nom, statut, dateDebut, dateResolution, dureeMs,
    nbPassations: apps.length,
    loc2hire: firstScooter.Loc2hire || '',
    locuser: firstScooter.LocUser || '',
    action: dernierApp.scooter.Action || '',
    urgence: firstScooter.Urgence || '',
    par: apps[0].passation['Créé par'] || ''
  };
}

function renderIncidents() {
  const content = document.getElementById('rapport-content');
  let filtered = _incidents;
  if (_activeFilter !== 'tous') filtered = _incidents.filter(i => i.statut === _activeFilter);

  if (!filtered.length) {
    const zone = content.querySelector('#incident-table-zone');
    if (zone) zone.innerHTML = '<div class="empty">Aucun incident pour ce filtre.</div>';
    return;
  }

  const fmtDate = d => d instanceof Date && !isNaN(d) ? d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';

  const rows = filtered.map(inc => {
    const urgBadge = inc.urgence ? `<span class="badge badge-${inc.urgence}">${inc.urgence}</span>` : '';
    const statutBadge = inc.statut === 'resolu'
      ? `<span class="badge badge-resolu">Resolu</span>`
      : `<span class="badge badge-en-cours">En cours</span>`;
    const dureeStr = formatDuree(inc.dureeMs);
    const dureeCls = dureeClass(inc.dureeMs);
    return `<tr class="row-${inc.statut}">
      <td><span class="scooter-nom">${inc.nom}</span></td>
      <td style="font-size:12px">${fmtDate(inc.dateDebut)}</td>
      <td style="font-size:12px">${inc.statut === 'resolu' ? fmtDate(inc.dateResolution) : '—'}</td>
      <td><span class="duree-cell ${dureeCls}">${dureeStr}</span></td>
      <td>${inc.nbPassations}</td>
      <td style="font-size:12px;color:var(--text-muted)">${inc.loc2hire || '—'}</td>
      <td>${urgBadge}</td>
      <td>${statutBadge}</td>
    </tr>`;
  }).join('');

  const zone = content.querySelector('#incident-table-zone');
  if (zone) {
    zone.innerHTML = `<div class="incident-table-wrap">
      <table class="incident-table">
        <thead>
          <tr>
            <th>Scooter</th>
            <th>Debut offline</th>
            <th>Resolution</th>
            <th>Duree</th>
            <th>Passations</th>
            <th>Localisation</th>
            <th>Urgence</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }
}

async function loadRapport() {
  const content = document.getElementById('rapport-content');
  content.innerHTML = '<div class="loading">Chargement...</div>';
  const { monday, sunday } = getWeekBounds(rapportWeekOffset);
  const fmt = d => d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('rapport-week-label').textContent = `${fmt(monday)} — ${fmt(sunday)}`;

  try {
    const [r1, r2] = await Promise.all([
      fetch(SCRIPT_URL + '?action=getPassations'),
      fetch(SCRIPT_URL + '?action=getScooters')
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    const allPassations = (d1.passations||[]).sort((a,b) => new Date(a.Date) - new Date(b.Date));
    const allScooters = d2.scooters||[];

    // Passations de la semaine
    const weekPassations = allPassations.filter(p => {
      const d = new Date(p.Date);
      return d >= monday && d <= sunday;
    });

    if (!weekPassations.length) {
      content.innerHTML = '<div class="empty">Aucune passation cette semaine.</div>';
      return;
    }

    // Build incidents for ALL passations (to detect resolution correctly)
    _incidents = buildIncidents(allPassations, allScooters);

    // Filter to incidents that were ACTIVE during the week
    const weekIncidents = _incidents.filter(inc => {
      const debutInWeek = inc.dateDebut >= monday && inc.dateDebut <= sunday;
      const resolvedInWeek = inc.dateResolution && inc.dateResolution >= monday && inc.dateResolution <= sunday;
      const activeduringWeek = inc.dateDebut <= sunday && (!inc.dateResolution || inc.dateResolution >= monday);
      return debutInWeek || resolvedInWeek || activeduringWeek;
    });
    _incidents = weekIncidents;

    // Stats
    const enCours = _incidents.filter(i => i.statut === 'en-cours').length;
    const resolus = _incidents.filter(i => i.statut === 'resolu').length;
    const dureesMoyennes = _incidents.filter(i => i.statut === 'resolu' && i.dureeMs > 0);
    const dureeMoy = dureesMoyennes.length > 0
      ? formatDuree(dureesMoyennes.reduce((s,i) => s + i.dureeMs, 0) / dureesMoyennes.length)
      : '—';
    const nbVpNok = weekPassations.filter(p => p.VP === 'non').length;

    content.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num">${_incidents.length}</div><div class="stat-label">Incidents</div></div>
        <div class="stat-card"><div class="stat-num danger">${enCours}</div><div class="stat-label">En cours</div></div>
        <div class="stat-card"><div class="stat-num success">${resolus}</div><div class="stat-label">Resolus</div></div>
        <div class="stat-card"><div class="stat-num warn" style="font-size:18px">${dureeMoy}</div><div class="stat-label">Duree moy.</div></div>
      </div>
      <div id="incident-table-zone"></div>
      ${nbVpNok > 0 ? `<div class="section" style="margin-top:0"><div class="section-header"><div class="section-icon">⚠️</div><div><div class="section-title">Alertes semaine</div></div></div><div style="font-size:13px;color:var(--text-muted)">VP non a jour : <strong style="color:var(--danger)">${nbVpNok} fois</strong></div></div>` : ''}
    `;

    renderIncidents();
  } catch(e) { content.innerHTML = '<div class="empty">Impossible de charger le rapport.</div>'; }
}

async function exportRapport() {
  if (!_incidents.length) return;
  const btn = document.getElementById('export-btn');
  btn.disabled = true; btn.textContent = 'Export...';
  const { monday, sunday } = getWeekBounds(rapportWeekOffset);
  const fmt = d => d instanceof Date && !isNaN(d) ? d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  const semaine = `${monday.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})} - ${sunday.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}`;
  const rows = _incidents.map(inc => ({
    semaine,
    scooter: inc.nom,
    statut: inc.statut === 'resolu' ? 'Resolu' : 'En cours',
    dateDebut: fmt(inc.dateDebut),
    dateResolution: fmt(inc.dateResolution),
    duree: formatDuree(inc.dureeMs),
    nbPassations: inc.nbPassations,
    loc2hire: inc.loc2hire,
    locuser: inc.locuser,
    action: inc.action,
    urgence: inc.urgence,
    par: inc.par
  }));
  try {
    await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({ action:'exportRapport', rows }), mode:'no-cors' });
    showToast('Rapport exporte dans Google Sheets !', 'success');
  } catch(e) { showToast('Erreur export.', 'error'); }
  btn.disabled = false; btn.textContent = 'Exporter Sheets';
}

initAstreinte();
</script>

</html>
